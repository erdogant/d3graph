    <style type="text/css">
        html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    box-sizing: border-box;
}

*,
*::before,
*::after {
    box-sizing: inherit;
}

.node text {
  font-size: 10px;
  font-family: "Helvetica";
  stroke: none;
  fill: grey;
}

.link {
  stroke: #999;
  stroke-opacity: .6;
}

h3 {
  color: #1ABC9C;
  text-align: center;
  font-style: italic;
  font-size: 14px;
  font-family: "Helvetica";
}

/* Sticky / fixed node indicator: dashed outline ring — works for all shape types */
.node .node-shape.node-fixed {
  stroke-dasharray: 4, 2;
  stroke-width: 2.5px;
}

/* Shared pointer cursor for all node shapes */
.node .node-shape {
  cursor: pointer;
}

/* Zoom-linked label visibility (performance): when zoomed far out, node and
   edge labels are unreadable anyway, so they're hidden via this single class
   toggle instead of being permanently removed. Placed after .node text so it
   wins on specificity ties. */
.labels-hidden text {
  display: none;
}

/* Master edges on/off switch (SVG mode). Canvas mode is handled purely in JS
   (skips drawing / clears the canvas) since there's no DOM to toggle. */
.edges-hidden .link,
.edges-hidden .link-text {
  display: none;
}

/* Stats/layout side panels. Positioned via JS (positionSidePanels(), in
   index_html.j2) rather than a hardcoded pixel offset — this codebase has
   twice hit bugs from guessed offsets that assumed a fixed top-panel height,
   which breaks the moment the top-panel wraps onto two lines on a narrower
   screen. JS measures the top-panel's actual rendered height at runtime and
   stacks every .stats-panel element below it in DOM order, so this scales
   to any number of panels on any screen size. top/left below are just the
   pre-JS fallback (first paint, before the script runs). */
.stats-panel {
  position: fixed;
  display: flex;
  flex-direction: column;
  /* Allow resizing in both width and height */
  resize: both;
  overflow: hidden;
  
  top: 10px;
  left: 10px;
  z-index: 1000;

  background: rgba(255, 255, 255, 0.92);
  border-radius: 8px;
  padding: 10px 14px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
  font-family: "Helvetica", Arial, sans-serif;
  font-size: 13px;
  width: 220px;
  min-width: 180px;
  max-width: min(600px, calc(100vw - 40px));
  /* Drag the bottom-right corner to widen/narrow. `resize` requires a
     scroll container even though we don't want vertical scrolling here —
     panel height is driven by content/positionSidePanels(), not by this,
     so overflow only ever kicks in if a panel is resized narrower than
     its content needs. The native resize-handle grip uses the browser's
     default color, which reads fine on both light and dark panels. */

  /* Prevent accidental shrinking to unusable sizes */
  min-width: 180px;
  min-height: 40px;

  /* Prevent growing outside the viewport */
  max-width: min(600px, calc(100vw - 40px));
  /* Pre-JS fallback only. positionSidePanels() overrides this per-panel with
     a max-height based on the panel's own top offset, since a flat 40px
     doesn't account for panels stacked further down the page — without that,
     a panel low in the stack (e.g. Node Info) could grow tall enough to push
     its bottom edge, and its resize handle, off the bottom of the screen
     with no way to grab it back. */
  max-height: calc(100vh - 40px);
}
/* Resizing a collapsed panel (title bar only) makes no sense, and its handle
   would sit right on top of the toggle icon, so disable it while collapsed. */
.stats-panel.collapsed {
  resize: none;
}
.stats-panel-body {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
}
.dark-mode .stats-panel {
  background: rgba(34, 34, 34, 0.92);
  color: #eee;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
}

.stats-panel .stats-panel-title {
  font-weight: bold;
  margin-bottom: 6px;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* Collapsed panels have no body margin left behind, and the title itself
   loses its bottom margin so the panel hugs the title tightly. */
.stats-panel.collapsed .stats-panel-title {
  margin-bottom: 0;
}
.stats-panel.collapsed .stats-panel-body {
  display: none;
}

.stats-panel-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-left: 8px;
  flex-shrink: 0;
  color: inherit;
  transition: transform 0.15s ease;
}
.stats-panel-toggle svg {
  width: 12px;
  height: 12px;
  display: block;
}
.stats-panel.collapsed .stats-panel-toggle {
  transform: rotate(-90deg);
}

.stats-panel label {
  display: block;
  margin: 4px 0;
  cursor: pointer;
}

.stats-panel .physics-control {
  margin: 10px 0;
}

.stats-panel .physics-control label {

  margin-bottom: 3px;
  cursor: default;
  font-weight: normal;
}

.stats-panel .physics-control input[type="range"] {

}

.stats-panel .button-switch {

  width: 100%;
  text-align: center;
  margin: 10px 0 0 0;
  box-sizing: border-box;
}


.dark-mode {

/* ---- Node Info panel ---- */
.node-info-nav {

.node-info-nav-btn {

}

.node-info-content {

  flex: 1;
  min-height: 0;
  overflow-y: auto;
  /* Small right-side gutter so the scrollbar (even at its thin resting
     width) never sits flush against the text next to it. */
  padding-right: 4px;
  /* Firefox: no per-state (hover) width control exists for native
     scrollbars, so this is the closest equivalent — always thin rather
     than the default width, at least matching the "resting" state below. */
  scrollbar-width: thin;
  scrollbar-color: rgba(0, 0, 0, 0.25) transparent;
}

/* Slim by default, widens only slightly on hover — "wider when needed"
   instead of permanently crowding the text next to it. Chrome/Edge/Safari
   only; Firefox falls back to the static scrollbar-width: thin above. */
.node-info-content::-webkit-scrollbar {
  width: 4px;
  transition: width 0.15s ease;
}
.node-info-content:hover::-webkit-scrollbar {

}

}
.dark-mode .node-info-content::-webkit-scrollbar-thumb:hover {

.node-info-connection-link {

.node-info-connection-link:hover {

}

.dark-mode #graphContainer {
    background-color: #222 !important;
}
.dark-mode .button-switch {
    background: #333;
    color: #eee;
    border: 1px solid #555;
}
.button-switch {
    display: inline-block;
    margin: 8px 4px;
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #fff;
    color: #222;
    cursor: pointer;
    font-size: 1em;
    font-family: inherit, Arial, sans-serif;
    transition: background 0.2s, color 0.2s;

/* Header row: top-panel buttons (right) + edge-threshold slider (centered)
   share one line. Grid with equal 1fr flanks keeps the slider centered on
   the row regardless of how wide the button group is; align-items:start
   keeps both children measured from the same top edge so
   positionSidePanels() (which measures .header-row, not .top-panel alone)
   gets an accurate height even if the slider and buttons differ in height. */
.header-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: start;
    gap: 8px;
    padding: 10px;
    width: 100%;
    box-sizing: border-box;
}
.header-row .slider-container {
    grid-column: 2;
    margin: 0;
}
.top-panel {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-content: start;
    gap: 8px;
    grid-column: 3;
}
.slider-container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 12px 0;
}
.slider-label {
    margin: 0 8px;
    font-size: 1em;
    font-family: inherit, Arial, sans-serif;
}
.styled-slider {
    -webkit-appearance: none;
    width: 180px;
    height: 8px;
    background: #eee;
    border-radius: 5px;
    outline: none;
    transition: background 0.2s;
    margin: 0 8px;
}
.styled-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #888;
    cursor: pointer;
    box-shadow: 0 0 2px #888;
}
.styled-slider::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #888;
    cursor: pointer;
    box-shadow: 0 0 2px #888;
}
.styled-slider:focus {
    background: #ddd;
}
.dark-mode .styled-slider {
    background: #444;
}
.dark-mode .styled-slider::-webkit-slider-thumb {
    background: #222;
    border: 2px solid #eee;
}
.dark-mode .styled-slider::-moz-range-thumb {
    background: #222;
    border: 2px solid #eee;
}

<!-- Top row: edge-threshold slider (centered) + top-panel buttons (right).
     The slider's visibility is governed by show_slider, not show_controls,
     so it still renders even when show_controls=False (e.g. embedding this
     HTML into a page that supplies its own button chrome but still wants
     the slider). -->

<div class="header-row">

<div class="top-panel">

    <button id="densityToggleButton" class="button-switch">Show Density</button>
</div>

</div>

</div>

<!-- Side panel: interactively recolor/resize nodes by common network statistics -->

    <label><input type="radio" name="statMetric" value="node_pagerank"> PageRank</label>

    <label><input type="radio" name="statMetric" value="network_clustering"> Network Clustering</label>
    </div>
</div>

<!-- Layout panel (Force-directed / Circular / Grid) removed from the UI -

     just unwired, in case this is worth revisiting later. -->

<!-- Side panel: interactively tune the force simulation -->
<div class="stats-panel collapsed" id="physicsPanel">
    <div class="stats-panel-title">Physics<span class="stats-panel-toggle" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span></div>
    <div class="stats-panel-body">
    <div class="physics-control">
        <label for="chargeSlider">Network Tension <span id="chargeValue">-600</span></label>
        <input type="range" id="chargeSlider" min="-2000" max="200" step="10" value="-600">
    </div>
    <div class="physics-control">
        <label for="collisionSlider">Collision <span id="collisionValue">0.5</span></label>
        <input type="range" id="collisionSlider" min="0" max="2" step="0.05" value="0.5">
    </div>
    <div class="physics-control">
        <label for="linkTensionSlider">Edge Tension <span id="linkTensionValue">1</span></label>
        <input type="range" id="linkTensionSlider" min="0" max="5" step="0.1" value="1">
    </div>
    <button id="physicsResetButton" class="button-switch">Reset to Default</button>
    </div>
</div>

<!-- Side panel: interactively tune the density heatmap layer -->
<div class="stats-panel collapsed" id="densityPanel">
    <div class="stats-panel-title">Density Layer<span class="stats-panel-toggle" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span></div>

    <div class="physics-control">

        <input type="range" id="densityOpacitySlider" min="0" max="1" step="0.05" value="0.8">
    </div>
    <button id="densityResetButton" class="button-switch">Reset to Default</button>
    </div>
</div>

    <div class="stats-panel-title">Node Info<span class="stats-panel-toggle" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span></div>
    <div class="stats-panel-body">
    <div class="node-info-nav">

    </div>
    <div id="nodeInfoContent" class="node-info-content">
        <div class="node-info-placeholder">Click a node to see its details.</div>
    </div>
    </div>
</div>

  //adjust threshold
  function threshold() {

    // threshold() itself (not a separate handler) so it stays in sync with
    // every path that sets the network state: the initial load call below,
    // and the "change" listener — no risk of the two drifting apart.
    var thresholdValueEl = document.getElementById('thresholdValue');
    if (thresholdValueEl) thresholdValueEl.textContent = thresh;

    graph.links.splice(0, graph.links.length);
    linkText = linkText.data([]);   // CLEAR EDGE-LABELS: Clear the linkText selection
    linkText.exit().remove();       // CLEAR EDGE-LABELS: Clear the linkText elements from the DOM

    for (var i = 0; i < graphRec.links.length; i++) {
      if (graphRec.links[i].edge_weight > thresh) {
        graph.links.push(graphRec.links[i]);
      }
    }

  // initialize the network state at that threshold. The slider element may
  // not exist (show_slider=False, or no usable weight range to slide over),
  // so fall back to a plain object carrying the same value threshold()
  // expects via `this`, rather than letting a missing element throw and
  // abort the rest of this function's setup.
  var thresholdSliderInit = document.getElementById('thresholdSlider');
  if (thresholdSliderInit) {
    thresholdSliderInit.value = 0;
    threshold.call(thresholdSliderInit);
    d3.select("#thresholdSlider").on("change", threshold);
  } else {
    threshold.call({ value: 0 });
  }

  // restart() (network refilter + recompute of whichever stat is active)
  // on every intermediate value — that still only happens on "change"
  // (drag release), same as before.
  var thresholdValueLiveEl = document.getElementById('thresholdValue');
  var thresholdSliderEl = document.getElementById('thresholdSlider');
  if (thresholdValueLiveEl && thresholdSliderEl) {
    thresholdSliderEl.addEventListener('input', function() {
      thresholdValueLiveEl.textContent = this.value;
    });
  }

  // visual, doesn't touch the underlying filtered data.
  var edgeToggleBtn = document.getElementById('edgeToggleButton');
  if (edgeToggleBtn) {
    edgeToggleBtn.addEventListener('click', function() {
      edgesVisible = !edgesVisible;
      edgeToggleBtn.textContent = edgesVisible ? 'Hide Edges' : 'Show Edges';
      applyEdgeVisibility();
    });
  }

  var densityToggleBtn = document.getElementById('densityToggleButton');
  var densityPanelEl = document.getElementById('densityPanel');

  // PageRank / HITS / degree / closeness / betweenness centrality arrive
  // precomputed server-side (networkx), since that's the only graph that
  // exists at render time. But the weight-threshold slider changes which
  // edges are actually "in" the network, and a statistic computed on
  // since-removed edges is stale. So these are recomputed client-side from
  // graph.links (the currently filtered edge set) every time
  // applyStatStyling() runs — i.e. on stat selection AND on every slider
  // change (restart() -> applyStatStyling()) — overwriting d[<stat key>]
  // on each node so the rest of the styling pipeline needs no changes.
  var DYNAMIC_STAT_KEYS = ['node_proba', 'node_pagerank', 'node_hits_hub', 'node_hits_authority',
    'node_degree', 'node_degree_centrality', 'node_closeness_centrality', 'node_betweenness_centrality'];

  // Adjacency built fresh from the CURRENT graph.nodes/graph.links.
  //
  // IMPORTANT: this always follows edges source -> target, never
  // symmetrized — regardless of config.directed. config.directed only
  // controls whether arrowheads are drawn (it's a display setting); the
  // underlying graph object these stats need to match is the one built
  // server-side by make_graph(), which is unconditionally an nx.DiGraph
  // (see d3graph.py). Treating the network as undirected here (as an
  // earlier version of this code did whenever config.directed was false,
  // which is also the default) was the actual bug behind mismatched
  // HITS hub/authority and skewed degree/closeness/betweenness scores —
  // it silently added a reverse edge for every edge, which networkx's
  // computation never does.
  function buildAdjacency() {
    var indices = graph.nodes.map(function(d) { return d.index; });
    var out = {}, inn = {};
    indices.forEach(function(i) { out[i] = []; inn[i] = []; });

    graph.links.forEach(function(l) {
      var s = (l.source && l.source.index !== undefined) ? l.source.index : l.source;
      var t = (l.target && l.target.index !== undefined) ? l.target.index : l.target;
      if (out[s] === undefined || out[t] === undefined) return; // safety
      out[s].push(t);
      inn[t].push(s);
    });

    return { indices: indices, out: out, inn: inn, n: indices.length };
  }

  // Raw degree: total in+out edge count. Distinct from Degree Centrality
  // below, which is this same count divided by (n-1) — a legitimate [0,1]
  // fraction by definition, not a bug, but not what "number of edges" means.
  function computeDegree(adj) {
    var result = {};
    adj.indices.forEach(function(i) {
      result[i] = adj.out[i].length + adj.inn[i].length;
    });
    return result;
  }

  function computeDegreeCentrality(adj) {
    var result = {};
    var n = adj.n;
    adj.indices.forEach(function(i) {

      // degree / (n - 1).
      var deg = adj.out[i].length + adj.inn[i].length;
      result[i] = (n > 1) ? deg / (n - 1) : 0;

  function bfsDistances(adj, sourceIdx, neighborsOf) {
    var dist = {};
    dist[sourceIdx] = 0;
    var queue = [sourceIdx];
    var head = 0;
    while (head < queue.length) {
      var u = queue[head++];
      var neighbors = neighborsOf[u];
      for (var k = 0; k < neighbors.length; k++) {
        var v = neighbors[k];
        if (dist[v] === undefined) {
          dist[v] = dist[u] + 1;
          queue.push(v);
        }
      }
    }
    return dist;
  }

  function computeClosenessCentrality(adj) {
    var result = {};
    var n = adj.n;
    adj.indices.forEach(function(i) {
      // networkx's closeness_centrality reverses directed graphs before
      // computing shortest paths, so a node's score reflects how reachable
      // it is FROM the rest of the network (incoming paths), not how far
      // it can reach outward. Traverse via `inn` (in-edges) to match —
      // using `out` here was inverting the metric for any graph with real
      // directionality.
      var dist = bfsDistances(adj, i, adj.inn);
      var reachable = Object.keys(dist).length; // includes i itself
      var totalDist = 0;
      for (var key in dist) totalDist += dist[key];
      if (reachable > 1 && totalDist > 0 && n > 1) {
        // Wasserman-Faust "improved" formula (networkx default): scales by
        // the fraction of the graph actually reached, so a node stuck in a
        // small component doesn't get an inflated score just for being
        // close to the few nodes it can see.
        result[i] = ((reachable - 1) / totalDist) * ((reachable - 1) / (n - 1));
      } else {
        result[i] = 0;
      }
    });
    return result;
  }

  // Brandes' algorithm, unweighted — O(V*E), single pass computes
  // betweenness for every node at once.
  function computeBetweennessCentrality(adj) {
    var n = adj.n;
    var betweenness = {};
    adj.indices.forEach(function(i) { betweenness[i] = 0; });

    adj.indices.forEach(function(s) {
      var S = [];
      var P = {}, sigma = {}, dist = {};
      adj.indices.forEach(function(i) { P[i] = []; sigma[i] = 0; dist[i] = -1; });
      sigma[s] = 1;
      dist[s] = 0;
      var queue = [s];
      var head = 0;
      while (head < queue.length) {
        var v = queue[head++];
        S.push(v);
        var neighbors = adj.out[v];
        for (var k = 0; k < neighbors.length; k++) {
          var w = neighbors[k];
          if (dist[w] < 0) {
            queue.push(w);
            dist[w] = dist[v] + 1;
          }
          if (dist[w] === dist[v] + 1) {
            sigma[w] += sigma[v];
            P[w].push(v);
          }
        }
      }
      var delta = {};
      adj.indices.forEach(function(i) { delta[i] = 0; });
      while (S.length) {
        var w = S.pop();
        for (var k = 0; k < P[w].length; k++) {
          var v = P[w][k];
          delta[v] += (sigma[v] / sigma[w]) * (1 + delta[w]);
        }
        if (w !== s) betweenness[w] += delta[w];
      }
    });

    // Normalize (networkx defaults, normalized=True, directed graph): scale
    // by 1/((n-1)(n-2)) — no halving, since directed pairs (s,t) and (t,s)
    // are distinct and each is only ever visited once as a source here.
    var scale = (n > 2) ? 1 / ((n - 1) * (n - 2)) : 0;
    adj.indices.forEach(function(i) { betweenness[i] = betweenness[i] * scale; });

    return betweenness;
  }

  // Power-iteration PageRank (damping 0.85), with dangling nodes (no
  // out-edges) leaking their rank uniformly to every node, same as
  // networkx's default handling.
  function computePageRank(adj) {
    var n = adj.n;
    if (n === 0) return {};
    var alpha = 0.85, maxIter = 100, tol = 1e-8;
    var rank = {};
    adj.indices.forEach(function(i) { rank[i] = 1 / n; });
    var outDegree = {};
    adj.indices.forEach(function(i) { outDegree[i] = adj.out[i].length; });

    for (var iter = 0; iter < maxIter; iter++) {
      var newRank = {};
      adj.indices.forEach(function(i) { newRank[i] = (1 - alpha) / n; });

      var danglingSum = 0;
      adj.indices.forEach(function(i) { if (outDegree[i] === 0) danglingSum += rank[i]; });
      adj.indices.forEach(function(i) { newRank[i] += alpha * danglingSum / n; });

      adj.indices.forEach(function(u) {
        if (outDegree[u] === 0) return;
        var share = alpha * rank[u] / outDegree[u];
        adj.out[u].forEach(function(v) { newRank[v] += share; });
      });

      var diff = 0;
      adj.indices.forEach(function(i) { diff += Math.abs(newRank[i] - rank[i]); });
      rank = newRank;
      if (diff < tol) break;
    }

    return rank;
  }

  // Power-iteration HITS. Hub and authority are computed together since
  // they're mutually dependent either way.
  function computeHITS(adj) {
    var hub = {}, auth = {};

    var maxIter = 100, tol = 1e-8;

    for (var iter = 0; iter < maxIter; iter++) {
      var newAuth = {};
      adj.indices.forEach(function(i) { newAuth[i] = 0; });
      adj.indices.forEach(function(u) {
        adj.out[u].forEach(function(v) { newAuth[v] += hub[u]; });
      });
      var authNorm = Math.sqrt(adj.indices.reduce(function(s, i) { return s + newAuth[i] * newAuth[i]; }, 0)) || 1;
      adj.indices.forEach(function(i) { newAuth[i] /= authNorm; });

      var newHub = {};
      adj.indices.forEach(function(i) { newHub[i] = 0; });
      adj.indices.forEach(function(u) {
        adj.out[u].forEach(function(v) { newHub[u] += newAuth[v]; });
      });
      var hubNorm = Math.sqrt(adj.indices.reduce(function(s, i) { return s + newHub[i] * newHub[i]; }, 0)) || 1;

        // Stacks every .stats-panel element (Network Statistic, Layout, ...)
        // below the header row (edge-threshold slider + top-panel buttons),
        // using its actual measured height rather than a hardcoded pixel
        // guess ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬ÃƒÂ¢Ã¢â€šÂ¬Ã‚Â a guessed offset breaks the moment the row wraps onto two
        // lines on a narrower screen, which is exactly what caused this
        // panel's earlier positioning bugs. Scales to any number of panels
        // automatically. Falls back to .top-panel alone if .header-row isn't
        // present (e.g. no edge-threshold slider to show).
        function positionSidePanels() {
            var headerRow = document.querySelector('.header-row') || document.querySelector('.top-panel');
            var panels = document.querySelectorAll('.stats-panel');
            if (!headerRow || !panels.length) return;
            var y = headerRow.getBoundingClientRect().bottom + 8;
            panels.forEach(function (panel) {
                panel.style.top = y + 'px';
                panel.style.left = '10px';
                // A flat "calc(100vh - 40px)" (the CSS fallback) ignores how
                // far down the stack this particular panel sits, so a panel
                // near the bottom (Node Info is last) could grow past the
                // bottom of the screen Ã¢â‚¬â€ taking its resize handle with it,
                // with no way to grab it back. Cap each panel's max-height to
                // whatever viewport space actually remains below its own top.
                panel.style.maxHeight = 'calc(100vh - ' + Math.round(y + 10) + 'px)';
                y += panel.getBoundingClientRect().height + 8;
            });
        }
        window.addEventListener('resize', positionSidePanels);

        // NEW: Reposition immediately whenever a panel is resized.
        if (window.ResizeObserver) {
            const panelObserver = new ResizeObserver(function() {
                positionSidePanels();
            });
            document.querySelectorAll('.stats-panel').forEach(function(panel) {
                panelObserver.observe(panel);
            });
        }


        // Collapsible side panels: clicking a panel's title hides/shows its
        // body (everything but the title) and flips the arrow. Re-stacks
        // immediately after, since positionSidePanels() measures each
        // panel's actual rendered height ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â a collapsed panel is just
        // shorter, no separate logic needed to close the gap.
        document.querySelectorAll('.stats-panel-title').forEach(function (title) {
            title.addEventListener('click', function () {
                var panel = title.parentElement;
                var collapsing = !panel.classList.contains('collapsed');
                if (collapsing) {
                    // Dragging the native resize handle sets an inline
                    // height on the panel. That inline height sticks around
                    // even after the body is hidden via the .collapsed CSS
                    // class, so a manually-resized panel would just show a
                    // tall block of empty space instead of actually
                    // shrinking Ã¢â‚¬â€ looking like the collapse button had
                    // stopped working. Remember it, then clear it so the
                    // panel really collapses down to the title bar.
                    if (panel.style.height) {
                        panel.dataset.expandedHeight = panel.style.height;
                    }
                    panel.style.height = '';
                } else if (panel.dataset.expandedHeight) {
                    // Restore whatever size the user had manually set.
                    panel.style.height = panel.dataset.expandedHeight;
                }
                panel.classList.toggle('collapsed');
                positionSidePanels();
            });
        });

        // Dark mode toggle logic
        const darkSwitch = document.getElementById('darkModeSwitch');
        let darkMode = true;
        let originalBg = document.body.style.backgroundColor;
        function setDarkMode(on) {
            if (on) {
                document.body.classList.add('dark-mode');
                document.body.style.backgroundColor = '#222';
                document.body.style.color = '#eee';
                let graphBg = document.getElementById('graphContainer');
                if (graphBg) graphBg.style.backgroundColor = '#222';
                if (darkSwitch) darkSwitch.textContent = '☀ Light Mode';
            } else {
                document.body.classList.remove('dark-mode');
                document.body.style.backgroundColor = originalBg;
                document.body.style.color = '';
                let graphBg = document.getElementById('graphContainer');
                if (graphBg) graphBg.style.backgroundColor = originalBg;
                if (darkSwitch) darkSwitch.textContent = '🌙 Dark Mode';
            }
            if (window.d3graphSetDarkMode) window.d3graphSetDarkMode(on);
        }
        // Set initial mode
        setDarkMode(darkMode);
        if (darkSwitch) {
            darkSwitch.addEventListener('click', function () {
                darkMode = !darkMode;
                setDarkMode(darkMode);
            });
        }

        // Save image to svg
        // Note: when the graph is large enough to switch to canvas-rendered edges
        // (see canvas_edge_threshold), this export will include nodes but not edges,
        // since edges live on a separate <canvas> element, not in the SVG DOM.
        var saveBtn = document.getElementById('saveButton');
        if (saveBtn) {
            saveBtn.addEventListener('click', function () {
            var svgData = document.querySelector('svg').outerHTML;
            var blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = 'd3graph.svg';
            link.click();
            });
        }
        
        
    </script>



</body>
